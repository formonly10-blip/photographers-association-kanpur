<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <title>Gold Member - Photographer Association Kanpur</title>

    <style>
        /* ========================================
           COMPLETE CSS - EMBEDDED
           ======================================== */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Poppins:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f6f3;
            background-image: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 215, 0, 0.02) 0%, transparent 50%);
            min-height: 100vh;
            color: #2d2d2d;
            overflow-x: hidden;
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(135deg, #f5a623, #ff6b6b);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        .particle:nth-child(1) { left: 5%; animation-duration: 14s; animation-delay: 0s; width: 3px; height: 3px; }
        .particle:nth-child(2) { left: 12%; animation-duration: 18s; animation-delay: 2s; width: 5px; height: 5px; }
        .particle:nth-child(3) { left: 20%; animation-duration: 12s; animation-delay: 4s; width: 2px; height: 2px; }
        .particle:nth-child(4) { left: 28%; animation-duration: 16s; animation-delay: 1s; width: 4px; height: 4px; }
        .particle:nth-child(5) { left: 35%; animation-duration: 13s; animation-delay: 3s; width: 3px; height: 3px; }
        .particle:nth-child(6) { left: 42%; animation-duration: 15s; animation-delay: 5s; width: 5px; height: 5px; }
        .particle:nth-child(7) { left: 50%; animation-duration: 19s; animation-delay: 2s; width: 2px; height: 2px; }
        .particle:nth-child(8) { left: 58%; animation-duration: 14s; animation-delay: 4s; width: 4px; height: 4px; }
        .particle:nth-child(9) { left: 65%; animation-duration: 17s; animation-delay: 1s; width: 3px; height: 3px; }
        .particle:nth-child(10) { left: 72%; animation-duration: 11s; animation-delay: 3s; width: 5px; height: 5px; }
        .particle:nth-child(11) { left: 80%; animation-duration: 16s; animation-delay: 6s; width: 3px; height: 3px; }
        .particle:nth-child(12) { left: 88%; animation-duration: 13s; animation-delay: 2s; width: 4px; height: 4px; }
        .particle:nth-child(13) { left: 95%; animation-duration: 15s; animation-delay: 4s; width: 2px; height: 2px; }
        .particle:nth-child(14) { left: 45%; animation-duration: 20s; animation-delay: 7s; width: 5px; height: 5px; }
        .particle:nth-child(15) { left: 75%; animation-duration: 14s; animation-delay: 5s; width: 3px; height: 3px; }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1); opacity: 0; }
        }

        /* ===== 3D FLOATING SHAPES ===== */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.04;
            animation: floatShape ease-in-out infinite alternate;
        }

        .shape:nth-child(1) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #f5a623, transparent);
            top: -150px;
            right: -150px;
            animation-duration: 25s;
        }

        .shape:nth-child(2) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ff6b6b, transparent);
            bottom: -200px;
            left: -200px;
            animation-duration: 30s;
            animation-delay: 3s;
        }

        .shape:nth-child(3) {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #f5a623, transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 35s;
            animation-delay: 6s;
        }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(40px, -40px) scale(1.1) rotate(120deg); }
            66% { transform: translate(-30px, 30px) scale(0.9) rotate(240deg); }
            100% { transform: translate(20px, -20px) scale(1.05) rotate(360deg); }
        }

        /* ===== HEADER ===== */
        .header {
            height: 80px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 9999;
            box-shadow: 0 2px 40px rgba(0, 0, 0, 0.06);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: headerFloat 12s ease-in-out infinite;
        }

        @keyframes headerFloat {
            0%, 100% { transform: rotateX(0deg) rotateY(0deg); box-shadow: 0 2px 40px rgba(0, 0, 0, 0.06); }
            25% { transform: rotateX(1deg) rotateY(-1deg); box-shadow: 0 4px 50px rgba(245, 166, 35, 0.08); }
            75% { transform: rotateX(-1deg) rotateY(1deg); box-shadow: 0 4px 50px rgba(255, 107, 107, 0.08); }
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f5a623, #ff6b6b, #f5a623, transparent);
            animation: shimmerGold 4s ease-in-out infinite;
            background-size: 300% 100%;
        }

        @keyframes shimmerGold {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo {
            height: 52px;
            width: auto;
            display: block;
            border-radius: 50%;
            border: 2px solid #f5a623;
            padding: 3px;
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(245, 166, 35, 0.15);
            transition: all 0.5s ease;
            transform-style: preserve-3d;
            animation: logo3D 10s ease-in-out infinite;
        }

        @keyframes logo3D {
            0%, 100% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
            25% { transform: rotateY(15deg) rotateX(5deg) scale(1.02); }
            75% { transform: rotateY(-15deg) rotateX(-5deg) scale(0.98); }
        }

        .logo:hover {
            transform: scale(1.08) rotate(-5deg) rotateY(25deg);
            box-shadow: 0 4px 40px rgba(245, 166, 35, 0.3);
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: 1.5px;
            font-family: 'Playfair Display', serif;
            animation: textPulse 5s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { text-shadow: 0 0 0px rgba(245, 166, 35, 0); }
            50% { text-shadow: 0 0 30px rgba(245, 166, 35, 0.08), 0 0 60px rgba(245, 166, 35, 0.04); }
        }

        .brand .highlight {
            background: linear-gradient(135deg, #f5a623, #e8890c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            animation: gradientMove 4s ease-in-out infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .brand::after {
            content: '✦';
            color: #f5a623;
            font-size: 12px;
            margin-left: 8px;
            opacity: 0.6;
            display: inline-block;
            animation: spinStar 8s linear infinite;
        }

        @keyframes spinStar {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            text-decoration: none;
            color: #4a4a5a;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 14px;
            padding: 10px 24px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            position: relative;
            background: rgba(245, 166, 35, 0.06);
            border: 1px solid rgba(245, 166, 35, 0.15);
            transform-style: preserve-3d;
            perspective: 500px;
        }

        .back-btn::before {
            content: '← ';
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #f5a623;
            background: rgba(245, 166, 35, 0.12);
            transform: translateY(-2px) rotateX(3deg);
            box-shadow: 0 8px 30px rgba(245, 166, 35, 0.1);
            border-color: #f5a623;
        }

        .back-btn:hover::before {
            transform: translateX(-5px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            padding: 60px 40px;
            margin: 30px 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.04);
            position: relative;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: sectionFloat 8s ease-in-out infinite;
            text-align: center;
        }

        @keyframes sectionFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-8px) rotateX(1deg); }
        }

        .main-content:hover {
            transform: translateY(-5px) rotateX(1deg) scale(1.005);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.06);
            border-color: rgba(245, 166, 35, 0.1);
        }

        .main-content::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f5a623, #ff6b6b, #f5a623, transparent);
            border-radius: 2px;
            opacity: 0.4;
            animation: lineShimmer 4s ease-in-out infinite;
        }

        @keyframes lineShimmer {
            0%, 100% { opacity: 0.3; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.1); }
        }

        .main-content::after {
            content: '◆';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: #f5a623;
            font-size: 16px;
            background: #f8f6f3;
            padding: 0 12px;
            animation: diamondSpin 10s linear infinite;
        }

        @keyframes diamondSpin {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: #1a1a2e;
            position: relative;
            display: inline-block;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #f5a623, #ff6b6b, #f5a623, transparent);
            border-radius: 2px;
            animation: lineWidth 5s ease-in-out infinite;
        }

        @keyframes lineWidth {
            0%, 100% { width: 100px; }
            50% { width: 150px; }
        }

        .gold-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f5a623, #e8890c);
            color: white;
            padding: 8px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
            animation: badgePulse 3s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(245, 166, 35, 0.3);
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(245, 166, 35, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 8px 40px rgba(245, 166, 35, 0.4); }
        }

        .subtitle {
            color: #4a4a5a;
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        /* ===== TABLE STYLING ===== */
        .table-container {
            max-width: 900px;
            margin: 30px auto;
            overflow-x: auto;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            overflow: hidden;
        }

        thead {
            background: linear-gradient(135deg, #f5a623, #e8890c);
        }

        th {
            padding: 16px 20px;
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: left;
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            color: #2d2d2d;
            font-weight: 400;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        tr {
            transition: all 0.3s ease;
        }

        tr:hover {
            background: rgba(245, 166, 35, 0.04);
            transform: scale(1.005);
        }

        tr:last-child td {
            border-bottom: none;
        }

        td:first-child {
            font-weight: 500;
            color: #1a1a2e;
        }

        .hindi {
            display: block;
            font-size: 12px;
            color: #8a8a9a;
            margin-top: 3px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* ===== TABLE ROW ANIMATION ===== */
        tr {
            animation: rowFade 0.6s ease forwards;
            opacity: 0;
        }

        tr:nth-child(1) { animation-delay: 0.1s; }
        tr:nth-child(2) { animation-delay: 0.2s; }
        tr:nth-child(3) { animation-delay: 0.3s; }
        tr:nth-child(4) { animation-delay: 0.4s; }
        tr:nth-child(5) { animation-delay: 0.5s; }
        tr:nth-child(6) { animation-delay: 0.6s; }
        tr:nth-child(7) { animation-delay: 0.7s; }

        @keyframes rowFade {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== FOOTER ===== */
        footer {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), #f8f6f3);
            text-align: center;
            padding: 30px 20px;
            margin-top: 30px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: footerFloat 15s ease-in-out infinite;
        }

        @keyframes footerFloat {
            0%, 100% { transform: rotateX(0deg); }
            50% { transform: rotateX(1deg); }
        }

        footer p {
            color: #8a8a9a;
            font-size: 15px;
            margin: 0 auto;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 100%;
        }

        footer p:last-child {
            font-size: 12px;
            margin-top: 6px;
            color: #c4c4c4;
            animation: footerGlow 5s ease-in-out infinite;
        }

        @keyframes footerGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); color: #f5a623; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                height: 70px;
                padding: 0 20px;
                animation: none;
            }

            .logo {
                height: 42px;
                animation: none;
            }

            .brand {
                font-size: 16px;
                animation: none;
            }

            .brand .highlight {
                font-size: 17px;
            }

            .brand::after {
                display: none;
            }

            .particles-container,
            .floating-shapes {
                display: none;
            }

            .main-content {
                padding: 40px 18px;
                margin: 15px 12px;
                border-radius: 14px;
                animation: none;
            }

            .main-content:hover {
                transform: translateY(-5px) scale(1.01);
            }

            h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 15px;
            }

            .table-container {
                margin: 20px 0;
            }

            th, td {
                padding: 12px 14px;
                font-size: 13px;
            }

            .hindi {
                font-size: 11px;
            }

            .back-btn {
                font-size: 13px;
                padding: 8px 18px;
            }

            footer {
                animation: none;
            }

            footer p {
                font-size: 13px;
            }

            footer p:last-child {
                font-size: 11px;
                animation: none;
            }
        }

        @media (max-width: 480px) {
            .header {
                height: 60px;
                padding: 0 12px;
            }

            .logo {
                height: 36px;
            }

            .brand {
                font-size: 13px;
            }

            .brand .highlight {
                font-size: 14px;
            }

            .left {
                gap: 10px;
            }

            .main-content {
                padding: 25px 12px;
                margin: 10px 8px;
                border-radius: 10px;
            }

            .main-content::after {
                font-size: 12px;
                top: -8px;
                padding: 0 8px;
            }

            h1 {
                font-size: 22px;
                padding-bottom: 10px;
            }

            h1::after {
                width: 60px;
            }

            .gold-badge {
                font-size: 11px;
                padding: 6px 20px;
            }

            .subtitle {
                font-size: 13px;
            }

            th, td {
                padding: 10px 10px;
                font-size: 12px;
            }

            .hindi {
                font-size: 10px;
            }

            .back-btn {
                font-size: 12px;
                padding: 6px 14px;
            }

            footer {
                padding: 15px 12px;
            }

            footer p {
                font-size: 11px;
            }

            footer p:last-child {
                font-size: 10px;
                animation: none;
            }
        }
    </style>
</head>

<body>

<!-- ===== FLOATING PARTICLES ===== -->
<div class="particles-container">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<!-- ===== 3D FLOATING SHAPES ===== -->
<div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<!-- ===== HEADER ===== -->
<header class="header">
    <div class="left">
        <img src="images/logo.png" class="logo" alt="Logo">
        <div class="brand">
            Photographer <span class="highlight">Association</span> Kanpur
        </div>
    </div>

    <a href="index.html" class="back-btn">Back to Home</a>
</header>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content">
    <div class="gold-badge">⭐ Gold Members</div>
    
    <h1>Gold Member</h1>
    <p class="subtitle">Welcome to the Gold Member page. Our distinguished leadership team.</p>

    <!-- TABLE START -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Designation</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>*</td>
                    <td>
                        *
                        <span class="hindi">*</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <!-- TABLE END -->
</div>

<!-- ===== FOOTER ===== -->
<footer>
    <p>© 2026 Photographers Association Kanpur | All Rights Reserved</p>
    <p>✦ Crafted with Excellence ✦</p>
</footer>

</body>
</html>
