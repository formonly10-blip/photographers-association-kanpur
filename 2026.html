<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <title>Activity 2026 - Photographer Association Kanpur</title>

    <style>
        /* ========================================
           COMPLETE CSS - EMBEDDED
           ======================================== */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Poppins:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f6f3;
            background-image: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 215, 0, 0.02) 0%, transparent 50%);
            min-height: 100vh;
            color: #2d2d2d;
            overflow-x: hidden;
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(135deg, #f5a623, #ff6b6b);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        .particle:nth-child(1) { left: 5%; animation-duration: 14s; animation-delay: 0s; width: 3px; height: 3px; }
        .particle:nth-child(2) { left: 12%; animation-duration: 18s; animation-delay: 2s; width: 5px; height: 5px; }
        .particle:nth-child(3) { left: 20%; animation-duration: 12s; animation-delay: 4s; width: 2px; height: 2px; }
        .particle:nth-child(4) { left: 28%; animation-duration: 16s; animation-delay: 1s; width: 4px; height: 4px; }
        .particle:nth-child(5) { left: 35%; animation-duration: 13s; animation-delay: 3s; width: 3px; height: 3px; }
        .particle:nth-child(6) { left: 42%; animation-duration: 15s; animation-delay: 5s; width: 5px; height: 5px; }
        .particle:nth-child(7) { left: 50%; animation-duration: 19s; animation-delay: 2s; width: 2px; height: 2px; }
        .particle:nth-child(8) { left: 58%; animation-duration: 14s; animation-delay: 4s; width: 4px; height: 4px; }
        .particle:nth-child(9) { left: 65%; animation-duration: 17s; animation-delay: 1s; width: 3px; height: 3px; }
        .particle:nth-child(10) { left: 72%; animation-duration: 11s; animation-delay: 3s; width: 5px; height: 5px; }
        .particle:nth-child(11) { left: 80%; animation-duration: 16s; animation-delay: 6s; width: 3px; height: 3px; }
        .particle:nth-child(12) { left: 88%; animation-duration: 13s; animation-delay: 2s; width: 4px; height: 4px; }
        .particle:nth-child(13) { left: 95%; animation-duration: 15s; animation-delay: 4s; width: 2px; height: 2px; }
        .particle:nth-child(14) { left: 45%; animation-duration: 20s; animation-delay: 7s; width: 5px; height: 5px; }
        .particle:nth-child(15) { left: 75%; animation-duration: 14s; animation-delay: 5s; width: 3px; height: 3px; }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1); opacity: 0; }
        }

        /* ===== 3D FLOATING SHAPES ===== */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.04;
            animation: floatShape ease-in-out infinite alternate;
        }

        .shape:nth-child(1) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #f5a623, transparent);
            top: -150px;
            right: -150px;
            animation-duration: 25s;
        }

        .shape:nth-child(2) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ff6b6b, transparent);
            bottom: -200px;
            left: -200px;
            animation-duration: 30s;
            animation-delay: 3s;
        }

        .shape:nth-child(3) {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #f5a623, transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 35s;
            animation-delay: 6s;
        }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(40px, -40px) scale(1.1) rotate(120deg); }
            66% { transform: translate(-30px, 30px) scale(0.9) rotate(240deg); }
            100% { transform: translate(20px, -20px) scale(1.05) rotate(360deg); }
        }

        /* ===== HEADER ===== */
        .header {
            height: 80px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 9999;
            box-shadow: 0 2px 40px rgba(0, 0, 0, 0.06);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: headerFloat 12s ease-in-out infinite;
        }

        @keyframes headerFloat {
            0%, 100% { transform: rotateX(0deg) rotateY(0deg); box-shadow: 0 2px 40px rgba(0, 0, 0, 0.06); }
            25% { transform: rotateX(1deg) rotateY(-1deg); box-shadow: 0 4px 50px rgba(245, 166, 35, 0.08); }
            75% { transform: rotateX(-1deg) rotateY(1deg); box-shadow: 0 4px 50px rgba(255, 107, 107, 0.08); }
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f5a623, #ff6b6b, #f5a623, transparent);
            animation: shimmerGold 4s ease-in-out infinite;
            background-size: 300% 100%;
        }

        @keyframes shimmerGold {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo {
            height: 52px;
            width: auto;
            display: block;
            border-radius: 50%;
            border: 2px solid #f5a623;
            padding: 3px;
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(245, 166, 35, 0.15);
            transition: all 0.5s ease;
            transform-style: preserve-3d;
            animation: logo3D 10s ease-in-out infinite;
        }

        @keyframes logo3D {
            0%, 100% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
            25% { transform: rotateY(15deg) rotateX(5deg) scale(1.02); }
            75% { transform: rotateY(-15deg) rotateX(-5deg) scale(0.98); }
        }

        .logo:hover {
            transform: scale(1.08) rotate(-5deg) rotateY(25deg);
            box-shadow: 0 4px 40px rgba(245, 166, 35, 0.3);
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: 1.5px;
            font-family: 'Playfair Display', serif;
            animation: textPulse 5s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { text-shadow: 0 0 0px rgba(245, 166, 35, 0); }
            50% { text-shadow: 0 0 30px rgba(245, 166, 35, 0.08), 0 0 60px rgba(245, 166, 35, 0.04); }
        }

        .brand .highlight {
            background: linear-gradient(135deg, #f5a623, #e8890c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            animation: gradientMove 4s ease-in-out infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .brand::after {
            content: '✦';
            color: #f5a623;
            font-size: 12px;
            margin-left: 8px;
            opacity: 0.6;
            display: inline-block;
            animation: spinStar 8s linear infinite;
        }

        @keyframes spinStar {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            text-decoration: none;
            color: #4a4a5a;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 14px;
            padding: 10px 24px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            position: relative;
            background: rgba(245, 166, 35, 0.06);
            border: 1px solid rgba(245, 166, 35, 0.15);
            transform-style: preserve-3d;
            perspective: 500px;
        }

        .back-btn::before {
            content: '← ';
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #f5a623;
            background: rgba(245, 166, 35, 0.12);
            transform: translateY(-2px) rotateX(3deg);
            box-shadow: 0 8px 30px rgba(245, 166, 35, 0.1);
            border-color: #f5a623;
        }

        .back-btn:hover::before {
            transform: translateX(-5px);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            padding: 60px 40px;
            margin: 30px 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.04);
            position: relative;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: sectionFloat 8s ease-in-out infinite;
            text-align: center;
        }

        @keyframes sectionFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-8px) rotateX(1deg); }
        }

        .main-content:hover {
            transform: translateY(-5px) rotateX(1deg) scale(1.005);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.06);
            border-color: rgba(245, 166, 35, 0.1);
        }

        .main-content::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f5a623, #ff6b6b, #f5a623, transparent);
            border-radius: 2px;
            opacity: 0.4;
            animation: lineShimmer 4s ease-in-out infinite;
        }

        @keyframes lineShimmer {
            0%, 100% { opacity: 0.3; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.1); }
        }

        .main-content::after {
            content: '◆';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: #f5a623;
            font-size: 16px;
            background: #f8f6f3;
            padding: 0 12px;
            animation: diamondSpin 10s linear infinite;
        }

        @keyframes diamondSpin {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: #1a1a2e;
            position: relative;
            display: inline-block;
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #f5a623, #ff6b6b, #f5a623, transparent);
            border-radius: 2px;
            animation: lineWidth 5s ease-in-out infinite;
        }

        @keyframes lineWidth {
            0%, 100% { width: 100px; }
            50% { width: 150px; }
        }

        .year-badge {
            display: inline-block;
            background: linear-gradient(135deg, #1a1a2e, #2d2d4a);
            color: #f5a623;
            padding: 8px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border: 1px solid rgba(245, 166, 35, 0.2);
            animation: badgeGlow 3s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 4px 20px rgba(245, 166, 35, 0.1); }
            50% { box-shadow: 0 8px 40px rgba(245, 166, 35, 0.2); }
        }

        .subtitle {
            color: #4a4a5a;
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        /* ===== GALLERY GRID ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .gallery-grid img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            filter: brightness(1);
            transform-style: preserve-3d;
            perspective: 500px;
            animation: galleryFloat 9s ease-in-out infinite;
        }

        .gallery-grid img:nth-child(2) { animation-delay: 0.5s; }
        .gallery-grid img:nth-child(3) { animation-delay: 1s; }
        .gallery-grid img:nth-child(4) { animation-delay: 1.5s; }
        .gallery-grid img:nth-child(5) { animation-delay: 2s; }
        .gallery-grid img:nth-child(6) { animation-delay: 2.5s; }
        .gallery-grid img:nth-child(7) { animation-delay: 3s; }
        .gallery-grid img:nth-child(8) { animation-delay: 3.5s; }
        .gallery-grid img:nth-child(9) { animation-delay: 4s; }
        .gallery-grid img:nth-child(10) { animation-delay: 4.5s; }
        .gallery-grid img:nth-child(11) { animation-delay: 5s; }
        .gallery-grid img:nth-child(12) { animation-delay: 5.5s; }
        .gallery-grid img:nth-child(13) { animation-delay: 6s; }
        .gallery-grid img:nth-child(14) { animation-delay: 6.5s; }
        .gallery-grid img:nth-child(15) { animation-delay: 7s; }
        .gallery-grid img:nth-child(16) { animation-delay: 7.5s; }
        .gallery-grid img:nth-child(17) { animation-delay: 8s; }
        .gallery-grid img:nth-child(18) { animation-delay: 8.5s; }
        .gallery-grid img:nth-child(19) { animation-delay: 9s; }
        .gallery-grid img:nth-child(20) { animation-delay: 9.5s; }
        .gallery-grid img:nth-child(21) { animation-delay: 10s; }

        @keyframes galleryFloat {
            0%, 100% {
                transform: translateY(0px) rotateX(0deg);
            }
            50% {
                transform: translateY(-6px) rotateX(2deg);
            }
        }

        .gallery-grid img:hover {
            transform: scale(1.06) rotateY(-5deg) rotateX(3deg);
            border-color: #f5a623;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.1),
                0 0 40px rgba(245, 166, 35, 0.05);
        }

        /* ===== LIGHTBOX ===== */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(30px);
            justify-content: center;
            align-items: center;
            z-index: 99999;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 92%;
            max-height: 92%;
            object-fit: contain;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8) rotateX(15deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateX(0deg);
            }
        }

        /* ===== FOOTER ===== */
        footer {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), #f8f6f3);
            text-align: center;
            padding: 25px 20px;
            margin-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: footerFloat 15s ease-in-out infinite;
        }

        @keyframes footerFloat {
            0%, 100% { transform: rotateX(0deg); }
            50% { transform: rotateX(1deg); }
        }

        footer p {
            color: #8a8a9a;
            font-size: 15px;
            margin: 0 auto;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 100%;
        }

        footer p:last-child {
            font-size: 12px;
            margin-top: 6px;
            color: #c4c4c4;
            animation: footerGlow 5s ease-in-out infinite;
        }

        @keyframes footerGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); color: #f5a623; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                height: 70px;
                padding: 0 20px;
                animation: none;
            }

            .logo {
                height: 42px;
                animation: none;
            }

            .brand {
                font-size: 16px;
                animation: none;
            }

            .brand .highlight {
                font-size: 17px;
            }

            .brand::after {
                display: none;
            }

            .particles-container,
            .floating-shapes {
                display: none;
            }

            .main-content {
                padding: 40px 18px;
                margin: 15px 12px;
                border-radius: 14px;
                animation: none;
            }

            .main-content:hover {
                transform: translateY(-5px) scale(1.01);
            }

            h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 15px;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 15px;
            }

            .gallery-grid img {
                height: 200px;
                animation: none;
            }

            .gallery-grid img:hover {
                transform: scale(1.04) rotate(-1deg);
            }

            .back-btn {
                font-size: 13px;
                padding: 8px 18px;
            }

            footer {
                animation: none;
            }

            footer p {
                font-size: 13px;
            }

            footer p:last-child {
                font-size: 11px;
                animation: none;
            }
        }

        @media (max-width: 480px) {
            .header {
                height: 60px;
                padding: 0 12px;
            }

            .logo {
                height: 36px;
            }

            .brand {
                font-size: 13px;
            }

            .brand .highlight {
                font-size: 14px;
            }

            .left {
                gap: 10px;
            }

            .main-content {
                padding: 25px 12px;
                margin: 10px 8px;
                border-radius: 10px;
            }

            .main-content::after {
                font-size: 12px;
                top: -8px;
                padding: 0 8px;
            }

            h1 {
                font-size: 22px;
                padding-bottom: 10px;
            }

            h1::after {
                width: 60px;
            }

            .year-badge {
                font-size: 13px;
                padding: 6px 20px;
            }

            .subtitle {
                font-size: 13px;
            }

            .gallery-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .gallery-grid img {
                height: 140px;
                border-radius: 10px;
            }

            .back-btn {
                font-size: 12px;
                padding: 6px 14px;
            }

            footer {
                padding: 15px 12px;
            }

            footer p {
                font-size: 11px;
            }

            footer p:last-child {
                font-size: 10px;
                animation: none;
            }
        }
    </style>
</head>

<body>

<!-- ===== FLOATING PARTICLES ===== -->
<div class="particles-container">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<!-- ===== 3D FLOATING SHAPES ===== -->
<div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<!-- ===== HEADER ===== -->
<header class="header">
    <div class="left">
        <img src="images/logo.png" class="logo" alt="Logo">
        <div class="brand">
            Photographer <span class="highlight">Association</span> Kanpur
        </div>
    </div>

    <a href="index.html" class="back-btn">Back to Home</a>
</header>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content">
    <div class="year-badge">📸 Activity 2026</div>
    
    <h1>Nikon Camera Workshop & Training Program</h1>
    <p class="subtitle">Professional photography training and hands-on workshop experience</p>

    <!-- GALLERY GRID -->
    <div class="gallery-grid">
        <img src="images/2026-1.jpg" alt="2026 Photo 1" onclick="openLightbox(this.src)">
        <img src="images/2026-2.jpg" alt="2026 Photo 2" onclick="openLightbox(this.src)">
        <img src="images/2026-3.jpg" alt="2026 Photo 3" onclick="openLightbox(this.src)">
        <img src="images/2026-4.jpg" alt="2026 Photo 4" onclick="openLightbox(this.src)">
        <img src="images/2026-5.jpg" alt="2026 Photo 5" onclick="openLightbox(this.src)">

<div id="lightbox" onclick="closeLightbox()">

<script>
    // ===== LIGHTBOX =====
    function openLightbox(src) {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = src;
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = '';
    }

    // Close with Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeLightbox();
        }
    });

    // ===== IMAGE CLICK HANDLER =====
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.gallery-grid img').forEach(img => {
            img.addEventListener('click', function(e) {
                e.stopPropagation();
                openLightbox(this.src);
            });
        });
    });
</script>
